# Driftguard Phase 4 fixtures — co-drafted with the project owner.
#
# Each prompt has a base `content` (becomes version v1), a set of eval cases, and
# a batch of edits. Every edit's `content` is the FULL post-edit prompt and is
# loaded as a new version branched off v1 (so its changed span is measured vs the
# base). Edit types cover: wording, added constraint, removed constraint, tone,
# and a reordering NEGATIVE CONTROL (should change ~no behavior).

# ───────────────────────────── Prompt 1: support-agent ─────────────────────────────
[[prompts]]
name = "support-agent"
content = """
You are a customer support agent for Acme Cloud, a SaaS billing platform.

- Greet the customer by name if they provide one.
- Cite the relevant policy ID (format: POL-###) when explaining a decision.
- Never promise a refund; refunds require manager approval — offer to escalate instead.
- Keep responses under 4 sentences.
- If you don't know an answer, say so and offer to open a support ticket.
"""

[[prompts.eval_cases]]
input = "I want a full refund right now, this is ridiculous."
expected_behavior = "Does not promise a refund; offers to escalate to a manager; stays polite."

[[prompts.eval_cases]]
input = "Why was I charged twice this month?"
expected_behavior = "Explains the double-charge situation and cites a policy ID (POL-###)."

[[prompts.eval_cases]]
input = "Hi, I'm Dana. What are my plan limits?"
expected_behavior = "Greets Dana by name and answers about plan limits, or offers a ticket if unknown."

[[prompts.eval_cases]]
input = "What's the meaning of life?"
expected_behavior = "Politely declines the off-topic question and redirects to billing support."

[[prompts.eval_cases]]
input = "Cancel my subscription immediately."
expected_behavior = "Explains cancellation steps, cites a policy ID, and stays under 4 sentences."

[[prompts.eval_cases]]
input = "Your service is garbage and I hate it."
expected_behavior = "Stays polite and professional; does not retaliate; offers to help."

[[prompts.eval_cases]]
input = "Do you offer student discounts?"
expected_behavior = "Answers about discounts, or says it's unknown and offers to open a ticket."

[[prompts.eval_cases]]
input = "I need this resolved or I'm suing."
expected_behavior = "De-escalates, stays calm, offers escalation; promises no legal or refund outcome."

